name: "Bug report"
description: "Report a bug in course content, structure, or interaction"
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue. Please fill out the fields so we can reproduce and fix it quickly.

  - type: textarea
    id: summary
    attributes:
      label: Problem summary
      description: What is failing exactly?
      placeholder: e.g. In module 07, the LFO widget does not play audio in Safari.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List clear, concrete steps to reproduce the issue.
      placeholder: |
        1. Open index.html
        2. Go to module 07
        3. Click "listen" in the LFO widget
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      placeholder: What happens instead?
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - High (blocks normal usage)
        - Medium (annoying but has workaround)
        - Low (minor detail)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: e.g. Chrome 135 / Safari 17.5

  - type: input
    id: device
    attributes:
      label: Device / OS
      placeholder: e.g. macOS 15, iPhone iOS 18

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, console logs, short video, etc.
