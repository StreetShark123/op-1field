name: "Feature request"
description: "Propose an improvement to content or user experience"
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. Let's keep changes practical and aligned with OP-1 Field workflows.

  - type: textarea
    id: goal
    attributes:
      label: Improvement goal
      description: What need does this solve?
      placeholder: e.g. Make the difference between internal resampling and external recording clearer.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Concrete proposal
      description: What exact change are you proposing?
      placeholder: e.g. Add an A/B block in module 11 with 3 reproducible steps.
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Improvement type
      options:
        - Didactic content
        - HTML/UI structure
        - Interactive widget
        - Workflow/editing
        - Documentation
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: criteria
    attributes:
      label: Acceptance criteria
      description: How do we know this is done well?
      placeholder: |
        - [ ] The exercise is understandable in under 2 minutes
        - [ ] It does not break the existing visual style
        - [ ] It stays aligned with OP-1 Field focus

  - type: textarea
    id: references
    attributes:
      label: References
      description: Official manual notes, examples, links, etc.
